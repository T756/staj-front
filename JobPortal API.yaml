          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVacancyList'
          description: ''
components:
  schemas:
    Application:
      type: object
      description: Serializer for creating and reading applications.
      properties:
        id:
          type: integer
          readOnly: true
        vacancy:
          type: integer
        resume:
          type: integer
        status:
          type: string
          readOnly: true
        cover_letter:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - resume
      - status
      - updated_at
      - vacancy
    ApplicationList:
      type: object
      description: Read-only serializer for listing a seeker's applications.
      properties:
        id:
          type: integer
          readOnly: true
        vacancy:
          type: integer
          readOnly: true
        vacancy_title:
          type: string
          readOnly: true
        vacancy_employer:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusD05Enum'
          readOnly: true
        cover_letter:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cover_letter
      - created_at
      - id
      - status
      - updated_at
      - vacancy
      - vacancy_employer
      - vacancy_title
    ApplicationMessage:
      type: object
      description: Serializer for direct messages.
      properties:
        id:
          type: integer
          readOnly: true
        application:
