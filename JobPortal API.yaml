openapi: 3.0.3
info:
  title: JobPortal API
  version: 1.0.0
  description: |-
    OpenAPI schema for the JobPortal MVP.

    Authentication flow:
    1. POST `/api/auth/register/` to create a user.
    2. POST `/api/auth/login/` with email and password to obtain JWTs.
    3. Send `Authorization: Bearer <access>` to protected endpoints.
    4. POST `/api/auth/refresh/` to rotate an expired access token.
paths:
  /api/applications/:
    post:
      operationId: applications_create
      description: Create a new application for the authenticated job seeker.
      summary: Create a job application
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
          description: ''
  /api/applications/{id}/status/:
    patch:
      operationId: applications_status_partial_update
      description: Partially update the status of an application.
      summary: Update application status (accept / reject)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - applications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApplicationStatusRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApplicationStatusRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApplicationStatusRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationList'
          description: ''
  /api/applications/interviews/:
