  /api/search/vacancies/:
    get:
      operationId: search_vacancies_list
      description: Execute a search query against MeiliSearch.
      parameters:
      - in: query
        name: employer_id
        schema:
          type: integer
        description: Filter by employer ID
      - in: query
        name: q
        schema:
          type: string
        description: Search query string
      - in: query
        name: salary_max
        schema:
          type: integer
        description: Filter by maximum salary
      - in: query
        name: salary_min
        schema:
          type: integer
        description: Filter by minimum salary
      - in: query
        name: status
        schema:
          type: string
        description: Filter by vacancy status (e.g., OPEN)
      tags:
      - search
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
